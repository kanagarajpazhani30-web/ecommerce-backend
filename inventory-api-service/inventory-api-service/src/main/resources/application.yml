spring:
  application:
    name: INVENTORY-API-SERVICE

  kafka:
    bootstrap-servers: host.docker.internal:9092
    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest

      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.e_commerce.inventory_api_service.common_dto.OrderEvent

    listener:
      ack-mode: manual
      missing-topics-fatal: false

    producer:
      retries: 3

  r2dbc:
    url: r2dbc:mysql://host.docker.internal:3306/ecommerce?sslMode=DISABLED&allowPublicKeyRetrieval=true&useServerPrepareStatement=true
    username: root
    password: pass

  sql:
    init:
      mode: always
      platform: mysql

  redis:
    host: host.docker.internal
    port: 6379
    database: 0
    timeout: 6000

logging:
  level:
    org.springframework.data.r2dbc: DEBUG
    dev.miku.r2dbc.mysql: DEBUG

server:
  port: 8092
  address: 0.0.0.0

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/