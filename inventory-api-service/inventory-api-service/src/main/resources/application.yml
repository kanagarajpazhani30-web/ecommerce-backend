spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest

      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        spring.json.trusted.packages: "*"

        spring.json.value.default.type: com.e_commerce.inventory_api_service.common_dto.OrderEvent

  application:
    name: inventory-api-service

  r2dbc:
    url: r2dbc:mysql://localhost:3306/ecommerce?sslMode=DISABLED&allowPublicKeyRetrieval=true&useServerPrepareStatement=true
    username: root
    password: pass

  sql:
    init:
      mode: always
      platform: mysql

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 6000

logging:
  level:
    org.springframework.data.r2dbc: DEBUG
    dev.miku.r2dbc.mysql: DEBUG

server:
  port: 8092
