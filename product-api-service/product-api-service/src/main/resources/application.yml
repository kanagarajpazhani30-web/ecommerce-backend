spring:
  application:
    name: PRODUCT-API-SERVICE

  r2dbc:
    url: r2dbc:mysql://host.docker.internal:3306/ecommerce?sslMode=DISABLED&allowPublicKeyRetrieval=true&useServerPrepareStatement=true
    username: root
    password: pass

  sql:
    init:
      mode: always
      platform: mysql

  redis:
    host: host.docker.internal
    port: 6379
    database: 0
    timeout: 6000

logging:
  level:
    org.springframework.data.r2dbc: DEBUG
    dev.miku.r2dbc.mysql: DEBUG

server:
  port: 8090
  address: 0.0.0.0

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/